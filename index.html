  <script src="data/gallery-items.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      var KEY = 'bss_intro_seen';
      var overlay = document.getElementById('intro-overlay');
      var video   = document.getElementById('intro-video');
      var unmute  = document.getElementById('intro-unmute');
      var skip    = document.getElementById('intro-skip');

      function dismiss() {
        overlay.classList.add('fade-out');
        video.pause();
        setTimeout(function() { overlay.style.display = 'none'; }, 650);
        sessionStorage.setItem(KEY, '1');
      }

      if (sessionStorage.getItem(KEY)) {
        overlay.style.display = 'none';
      } else {
        video.addEventListener('ended', dismiss);
        skip.addEventListener('click', dismiss);
        unmute.addEventListener('click', function() {
          video.muted = !video.muted;
          unmute.textContent = video.muted ? 'Unmute' : 'Mute';
          unmute.setAttribute('aria-label', video.muted ? 'Unmute intro' : 'Mute intro');
        });
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
